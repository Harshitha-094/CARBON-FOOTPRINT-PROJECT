v<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Footprint Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🌱 Carbon Footprint Tracker</h1>

    <p>Track your environmental impact easily</p>

    <label for="electricity">Electricity (kWh):</label>
    <input
        type="number"
        id="electricity"
        placeholder="Enter electricity usage"
        min="0"
    >

    <label for="travel">Travel (km):</label>
    <input
        type="number"
        id="travel"
        placeholder="Enter travel distance"
        min="0"
    >

    <button onclick="calculateFootprint()">
        Calculate
    </button>

    <button onclick="clearHistory()">
        Clear History
    </button>

    <h2 id="result"></h2>

    <!-- ECO TIPS -->
    <p id="tips"></p>

    <!-- EMISSION GRAPH -->
    <div class="graph">
        <h3>📊 Emission Breakdown</h3>

        <div id="barElectricity"></div>

        <div id="barTravel"></div>
    </div>

    <!-- HISTORY -->
    <div class="history">
        <h3>📝 History</h3>

        <ul id="historyList"></ul>
    </div>

    <!-- FOOTER -->
    <footer>
        <hr>
        <p>
            🌱 Carbon Footprint Awareness Platform
            <br>
            Developed by Harshitha
        </p>
    </footer>

</div>

<script src="script.js"></script>

</body>
</html>
