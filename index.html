<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Footprint Tracker</title>

    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

    <h1>🌱 Carbon Footprint Tracker</h1>

    <p>Track your environmental impact easily</p>

    <label for="electricity">Electricity Usage (kWh)</label>
    <input
        type="number"
        id="electricity"
        placeholder="Enter electricity usage"
        min="0"
        aria-label="Electricity Usage"
    >

    <label for="travel">Travel Distance (km)</label>
    <input
        type="number"
        id="travel"
        placeholder="Enter travel distance"
        min="0"
        aria-label="Travel Distance"
    >

    <div class="button-group">
        <button onclick="calculateFootprint()">
            Calculate
        </button>

        <button onclick="clearHistory()">
            Clear History
        </button>

        <button onclick="toggleDarkMode()">
            🌙 Dark Mode
        </button>

        <button onclick="downloadReport()">
            📥 Download Report
        </button>
    </div>

    <h2 id="result"></h2>

    <p id="tips"></p>

    <!-- Graph -->
    <div class="graph">
        <h3>📊 Emission Breakdown</h3>

        <div id="barElectricity"></div>

        <div id="barTravel"></div>
    </div>

    <!-- Pie Chart -->
    <div class="chart-section">
        <h3>🥧 Emission Distribution</h3>
        <canvas id="emissionChart"></canvas>
    </div>

    <!-- Trend Graph -->
    <div class="chart-section">
        <h3>📈 Carbon Trend</h3>
        <canvas id="trendChart"></canvas>
    </div>

    <!-- History -->
    <div class="history">
        <h3>📝 Calculation History</h3>

        <ul id="historyList"></ul>
    </div>

    <footer>
        <hr>

        <p>
            🌱 Carbon Footprint Awareness Platform
            <br>
            Developed by Harshitha
        </p>
    </footer>

</div>

<script src="script.js"></script>

</body>
</html>
